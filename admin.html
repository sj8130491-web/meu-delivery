<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestor do Chefe | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10 font-sans">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-black text-gray-800 mb-8 italic">GESTOR <span class="text-red-600">PRO</span></h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-gray-400 uppercase text-xs mb-6 tracking-widest">Novo Produto</h2>
                <div class="space-y-3">
                    <input id="n" type="text" placeholder="Nome do prato" class="w-full p-3 bg-gray-50 rounded-xl border outline-none focus:border-red-500">
                    <input id="p" type="text" placeholder="Preço (Ex: 25.00)" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                    <select id="c" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                        <option value="marmitas">Marmitas</option>
                        <option value="bebidas">Bebidas</option>
                    </select>
                    <input id="i" type="text" placeholder="Link da Imagem" class="w-full p-3 bg-gray-50 rounded-xl border outline-none">
                    <button onclick="salvar()" class="w-full bg-red-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-red-200 uppercase text-xs">Cadastrar Agora</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-gray-400 uppercase text-xs mb-6 tracking-widest">Seu Cardápio</h2>
                <div id="lista-prod" class="space-y-3 overflow-y-auto max-h-[400px]"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-gray-400 uppercase text-xs mb-6 tracking-widest">Pedidos de Hoje</h2>
                <div id="lista-vendas" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="print-area" class="hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://njxejwrdjemmrmdtenit.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGVqd3JkamVtbXJtZHRlbml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTg5MTYsImV4cCI6MjA4Nzc3NDkxNn0.HlZh45ptmLnt09nclbrwFNKshiyhBaLkBfhfLz-5xB4');

        async function salvar() {
            const item = {
                nome: document.getElementById('n').value,
                preco: document.getElementById('p').value,
                categoria: document.getElementById('c').value,
                imagem: document.getElementById('i').value
            };
            if(!item.nome || !item.preco) return alert("Preencha os campos!");
            await _supabase.from('produto').insert([item]);
            alert("Sucesso!"); location.reload();
        }

        async function carregar() {
            // Lista Produtos
            const { data: prods } = await _supabase.from('produto').select('*');
            document.getElementById('lista-prod').innerHTML = prods.map(p => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border">
                    <span class="text-xs font-bold">${p.nome}</span>
                    <button onclick="excluir(${p.id})" class="text-red-500 font-black text-[10px]">X</button>
                </div>
            `).join('');

            // Lista Pedidos
            const { data: vends } = await _supabase.from('pedidos').select('*').order('created_at', {ascending: false});
            document.getElementById('lista-vendas').innerHTML = vends.map(v => `
                <div class="border-b pb-2">
                    <p class="text-sm font-bold">${v.cliente}</p>
                    <p class="text-[10px] text-gray-400">${v.itens}</p>
                    <button onclick="imprimir('${v.id}')" class="mt-2 bg-black text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Imprimir</button>
                </div>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Apagar produto?")) {
                await _supabase.from('produto').delete().eq('id', id);
                carregar();
            }
        }

        async function imprimir(id) {
            const { data: v } = await _supabase.from('pedidos').select('*').eq('id', id).single();
            document.getElementById('print-area').innerHTML = `
                <div style="font-family:monospace; padding: 20px; width: 80mm">
                    <center><b>*** PEDIDO DO CHEFE ***</b></center><br>
                    <b>CLIENTE:</b> ${v.cliente}<br>
                    <b>PEDIDO:</b> ${v.itens}<br>
                    <b>TOTAL:</b> R$ ${v.total.toFixed(2)}<br>
                    <b>PAGAMENTO:</b> ${v.pagamento || 'A combinar'}<br>
                    <br><center>Obrigado pela preferência!</center>
                </div>
            `;
            window.print();
        }

        carregar();
    </script>
</body>
</html>
