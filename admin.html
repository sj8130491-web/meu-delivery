<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel | Marmita do Chefe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase italic">Painel de Pedidos</h1>
                <p class="text-gray-400 text-sm">Gerencie suas vendas em tempo real</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold text-gray-400 uppercase">Faturamento Hoje</p>
                <span id="faturamento" class="text-2xl font-black text-green-600">R$ 0,00</span>
            </div>
        </header>

        <div id="lista-pedidos" class="space-y-4">
            <p class="text-center text-gray-400">Carregando pedidos...</p>
        </div>
    </div>

    <script>
        // Use as MESMAS credenciais do seu index.html
        const _supabase = supabase.createClient('https://njxejwrdjemmrmdtenit.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGVqd3JkamVtbXJtZHRlbml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTg5MTYsImV4cCI6MjA4Nzc3NDkxNn0.HlZh45ptmLnt09nclbrwFNKshiyhBaLkBfhfLz-5xB4');

        async function buscarPedidos() {
            // Busca os pedidos do dia, do mais novo para o mais antigo
            const { data, error } = await _supabase
                .from('pedidos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            renderizarPedidos(data);
        }

        function renderizarPedidos(pedidos) {
            const container = document.getElementById('lista-pedidos');
            let faturamentoTotal = 0;

            if (pedidos.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 p-10 bg-white rounded-2xl">Nenhum pedido hoje.</p>';
                return;
            }

            container.innerHTML = pedidos.map(p => {
                faturamentoTotal += p.total;
                const data = new Date(p.created_at).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

                return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 ${p.tipo === 'entrega' ? 'border-red-500' : 'border-blue-500'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-bold text-gray-400 uppercase">${data} - #${p.id}</span>
                                <h3 class="font-black text-lg text-gray-800 uppercase">${p.cliente}</h3>
                                <p class="text-sm text-gray-500">📍 ${p.endereco}</p>
                            </div>
                            <div class="text-right">
                                <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">${p.pagamento}</span>
                                <p class="font-black text-xl text-gray-800 mt-2">R$ ${p.total.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-700 italic border border-dashed">
                            ${p.itens}
                        </div>
                        <button onclick="window.print()" class="mt-4 text-[10px] font-bold text-red-500 uppercase hover:underline">Imprimir Comanda</button>
                    </div>
                `;
            }).join('');

            document.getElementById('faturamento').innerText = `R$ ${faturamentoTotal.toFixed(2)}`;
        }

        // Atualiza os pedidos a cada 30 segundos sozinho
        buscarPedidos();
        setInterval(buscarPedidos, 30000);
    </script>
</body>
</html>
