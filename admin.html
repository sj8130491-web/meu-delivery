<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Marmita do Chefe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 pb-10">
    <div class="max-w-5xl mx-auto p-4">
        
        <header class="flex justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-gray-800 uppercase italic">Gestão do Chefe</h1>
                <span id="faturamento" class="text-2xl font-black text-green-600">R$ 0,00</span>
            </div>
            <button onclick="abrirModal()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">+ Novo Item</button>
        </header>

        <div id="modal-produto" class="hidden bg-white p-6 rounded-2xl shadow-md mb-8 border-2 border-blue-100">
            <h2 id="titulo-form" class="font-bold mb-4 uppercase text-gray-600 text-sm">Novo Item</h2>
            <input type="hidden" id="p-id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="p-nome" placeholder="Nome do Produto" class="p-3 bg-gray-50 rounded-lg border outline-none">
                <input type="number" id="p-preco" placeholder="Preço (Ex: 25.00)" class="p-3 bg-gray-50 rounded-lg border outline-none">
                
                <input type="text" id="p-cat" placeholder="Categoria (marmita, espetinho ou bebidas)" class="p-3 bg-gray-50 rounded-lg border outline-none">
                
                <input type="text" id="p-ingred" placeholder="Ingredientes / Descrição (Opcional)" class="p-3 bg-gray-50 rounded-lg border outline-none">
                
                <input type="text" id="p-img" placeholder="URL da Imagem (Cole o link aqui)" class="p-3 bg-gray-50 rounded-lg border outline-none md:col-span-2">

                <div class="flex gap-2 md:col-span-2">
                    <button onclick="salvarProduto()" class="flex-1 bg-green-600 text-white p-3 rounded-lg font-black uppercase">Gravar no Banco</button>
                    <button onclick="limparForm()" class="bg-gray-200 text-gray-600 p-3 rounded-lg font-bold">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="font-black mb-4 text-gray-400 uppercase text-xs tracking-widest">Pedidos de Hoje</h2>
                <div id="lista-pedidos" class="space-y-4"></div>
            </div>
            <div>
                <h2 class="font-black mb-4 text-gray-400 uppercase text-xs tracking-widest">Seu Cardápio</h2>
                <div id="lista-produtos" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://njxejwrdjemmrmdtenit.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qeGVqd3JkamVtbXJtZHRlbml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTg5MTYsImV4cCI6MjA4Nzc3NDkxNn0.HlZh45ptmLnt09nclbrwFNKshiyhBaLkBfhfLz-5xB4');

        async function buscarPedidos() {
            const { data } = await _supabase.from('pedidos').select('*').order('created_at', { ascending: false });
            let totalDia = 0;
            document.getElementById('lista-pedidos').innerHTML = (data || []).map(p => {
                totalDia += p.total;
                return `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${p.tipo === 'entrega' ? 'border-red-500' : 'border-blue-500'}">
                    <h3 class="font-bold text-gray-800">${p.cliente}</h3>
                    <p class="text-xs text-gray-500">${p.itens}</p>
                    <p class="font-black text-red-600">R$ ${p.total.toFixed(2)}</p>
                </div>`;
            }).join('');
            document.getElementById('faturamento').innerText = `R$ ${totalDia.toFixed(2)}`;
        }

        async function buscarProdutos() {
            const { data } = await _supabase.from('produto').select('*').order('nome');
            document.getElementById('lista-produtos').innerHTML = (data || []).map(p => `
                <div class="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <img src="${p.imagem}" class="w-10 h-10 rounded object-cover">
                        <div>
                            <p class="font-bold text-sm">${p.nome}</p>
                            <p class="text-[10px] text-gray-400 capitalize">${p.categoria}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick='prepararEdicao(${JSON.stringify(p)})' class="text-blue-500 text-xs font-bold uppercase">Editar</button>
                        <button onclick="excluirProduto(${p.id})" class="text-red-400 text-xs uppercase">Apagar</button>
                    </div>
                </div>`).join('');
        }

        function prepararEdicao(p) {
            document.getElementById('modal-produto').classList.remove('hidden');
            document.getElementById('titulo-form').innerText = "Editando: " + p.nome;
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nome').value = p.nome;
            document.getElementById('p-preco').value = p.preco;
            document.getElementById('p-cat').value = p.categoria;
            document.getElementById('p-ingred').value = p.ingredientes || '';
            document.getElementById('p-img').value = p.imagem || '';
            window.scrollTo(0,0);
        }

        async function salvarProduto() {
            const id = document.getElementById('p-id').value;
            const linkImagem = document.getElementById('p-img').value;

            const dados = {
                nome: document.getElementById('p-nome').value,
                preco: parseFloat(document.getElementById('p-preco').value),
                categoria: document.getElementById('p-cat').value.toLowerCase().trim(),
                ingredientes: document.getElementById('p-ingred').value,
                imagem: linkImagem || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400'
            };

            if(!dados.nome || !dados.preco || !dados.categoria) return alert("Preencha Nome, Preço e Categoria!");

            let erro;
            if(id) {
                const { error } = await _supabase.from('produto').update(dados).eq('id', id);
                erro = error;
            } else {
                const { error } = await _supabase.from('produto').insert([dados]);
                erro = error;
            }

            if(erro) {
                console.error(erro);
                alert("Erro ao salvar no banco!");
            } else {
                location.reload();
            }
        }

        function limparForm() {
            document.getElementById('modal-produto').classList.add('hidden');
            document.getElementById('p-id').value = "";
            document.getElementById('p-nome').value = "";
            document.getElementById('p-preco').value = "";
            document.getElementById('p-cat').value = "";
            document.getElementById('p-ingred').value = "";
            document.getElementById('p-img').value = "";
        }

        function abrirModal() {
            limparForm();
            document.getElementById('modal-produto').classList.remove('hidden');
            document.getElementById('titulo-form').innerText = "Novo Item";
        }

        async function excluirProduto(id) {
            if(confirm("Tem certeza que deseja apagar?")) {
                await _supabase.from('produto').delete().eq('id', id);
                buscarProdutos();
            }
        }

        buscarPedidos();
        buscarProdutos();
        setInterval(buscarPedidos, 30000); // Atualiza pedidos a cada 30 segundos
    </script>
</body>
</html>
